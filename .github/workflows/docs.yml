name: Documentation Generation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate OpenAPI specification
        run: |
          python -c "from vision_monitor.app.main import app; import json; json.dump(app.openapi(), open('docs/openapi.json', 'w'))"
      
      - name: Generate API documentation
        run: |
          python scripts/generate_docs.py api
      
      - name: Generate changelog
        run: |
          python scripts/generate_docs.py changelog
      
      - name: Generate architecture documentation
        run: |
          python scripts/generate_docs.py architecture
      
      - name: Generate deployment documentation
        run: |
          python scripts/generate_docs.py deployment
      
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/
          retention-days: 30
      
      - name: Commit documentation changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-generate documentation [skip ci]"
      
      - name: Push documentation changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
