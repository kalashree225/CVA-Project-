groups:
  - name: vision_monitor_alerts
    interval: 30s
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(inference_latency_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High latency detected"
          description: "P95 latency is above 5 seconds for the last 5 minutes"
      
      - alert: HighErrorRate
        expr: rate(inference_requests_total{status="failed"}[5m]) / rate(inference_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"
      
      - alert: HighHallucinationScore
        expr: avg(hallucination_score_bucket) > 0.5
        for: 10m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "High hallucination scores detected"
          description: "Average hallucination score is above 0.5 for the last 10 minutes"
      
      - alert: DatabaseConnectionPoolExhausted
        expr: database_connections / 100 > 0.9
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool usage is above 90%"
      
      - alert: TooManyAlertEvents
        expr: rate(alert_events_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High alert event rate"
          description: "Alert events rate is above 10 per second"
