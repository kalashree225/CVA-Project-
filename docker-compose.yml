services:
  traefik:
    image: traefik:v3.0
    container_name: vision_monitor_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - vision_monitor_network

  postgres:
    image: postgres:15
    container_name: vision_monitor_postgres
    environment:
      POSTGRES_USER: vision_monitor
      POSTGRES_PASSWORD: vision_monitor_pass
      POSTGRES_DB: vision_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_monitor_network

  redis:
    image: redis:7-alpine
    container_name: vision_monitor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_monitor_network

  influxdb:
    image: influxdb:2.7
    container_name: vision_monitor_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: vision-monitor
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD-SHELL", "influx ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_monitor_network

  minio:
    image: minio/minio:latest
    container_name: vision_monitor_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_monitor_network

  prometheus:
    image: prom/prometheus:latest
    container_name: vision_monitor_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - vision_monitor_network

  grafana:
    image: grafana/grafana:latest
    container_name: vision_monitor_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: adminpassword
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_monitor_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision_monitor_app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vision_monitor:vision_monitor_pass@postgres:5432/vision_monitor
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-token
      INFLUXDB_ORG: vision-monitor
      INFLUXDB_BUCKET: metrics
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: vision-monitor-media
      PINECONE_API_KEY: ${PINECONE_API_KEY:-your-pinecone-api-key}
      PINECONE_INDEX: vision-monitor-embeddings
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-your-langfuse-public-key}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-your-langfuse-secret-key}
      LANGFUSE_HOST: https://cloud.langfuse.com
      VALID_API_KEYS: key1,key2,key3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./vision_monitor:/app
      - ./scripts:/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - vision_monitor_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision_monitor_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://vision_monitor:vision_monitor_pass@postgres:5432/vision_monitor
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-token
      INFLUXDB_ORG: vision-monitor
      INFLUXDB_BUCKET: metrics
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: vision-monitor-media
      PINECONE_API_KEY: ${PINECONE_API_KEY:-your-pinecone-api-key}
      PINECONE_INDEX: vision-monitor-embeddings
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-your-langfuse-public-key}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-your-langfuse-secret-key}
      LANGFUSE_HOST: https://cloud.langfuse.com
      VALID_API_KEYS: key1,key2,key3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./vision_monitor:/app
      - ./scripts:/scripts
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=2
    networks:
      - vision_monitor_network

  backup_scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision_monitor_backup_scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://vision_monitor:vision_monitor_pass@postgres:5432/vision_monitor
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: vision-monitor-media
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./vision_monitor:/app
      - ./scripts:/scripts
      - backup_data:/backups
    command: >
      sh -c "
      while true; do
        echo 'Running backup at $(date)'
        /scripts/backup_postgres.sh
        /scripts/backup_minio.sh
        sleep 86400
      done
      "
    networks:
      - vision_monitor_network

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  minio_data:
  prometheus_data:
  grafana_data:
  traefik_letsencrypt:
  backup_data:

networks:
  vision_monitor_network:
    driver: bridge
